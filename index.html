<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Index</title>
    <!-- Estilos -->
    <link rel="stylesheet" type="text/css" href="estilosmiespacio.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Scripts -->
    <script type="text/javascript" src="Scripts.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-unidad">
        <div class="cabeza">
            <div id="titulo">Mi espacio</div>
        </div>
        <div class="contenido">
            <div class="barra-quiz">
                <div onclick="directorio(3,0)"><p>Quiz</p></div>
            </div>
            <div id="elemento-contenido">
                <p>Quiz 1</p>
                <div id="canvas">
                    <canvas id="barra-progreso1">
                    </canvas>
                </div>
                <p id="progreso1">Progreso: </p>
            </div>
            <div id="elemento-contenido">
                <p>Quiz 2</p>
                <div id="canvas">
                    <canvas id="barra-progreso2">
                    </canvas>
                </div>
                <p id="progreso2">Progreso: </p>
            </div>
        </div>
        <div class="barra">
            <div id="elemento-barra" onclick="directorio(1,0)"><p id="barra-p-centrado">Unidad 1</p></div>
            <div id="elemento-barra" onclick="directorio(2,0)"><p id="barra-p-centrado">Unidad 2</p></div>
            <div id="elemento-barra-activo" onclick="directorio(4,0)"><p id="barra-p-centrado">Mi espacio</p></div>
        </div>
    </div>
</body>
<script>
    window.addEventListener('load', cargarmiespacio);
</script>
<script>
    for (let i = 1; i <= 2; i++) {
        let progreso = localStorage.getItem("correctasq" + i);
        let nprogreso = Number(progreso);
        nprogreso *= 20;
        let grafico = document.getElementById('barra-progreso' + i);
        let progr = nprogreso;
        let falta = 100 - nprogreso;
        new Chart(grafico, {
            type: 'doughnut',
            data: {
                labels: ['Progreso', 'Restante'],

                datasets: [
                    {
                        data: [progr, falta],
                        backgroundColor: ['#ffdb1e', '#80c2ff'],
                        borderWidth: 0
                    }
                ]
            },
            options: {
                coutout: '90%',
                rotation: 270,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                }
            }
        });
    }
</script>
</html>
